<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hipper Therapeutics - Fitness Dashboard</title>
    <link rel="stylesheet" href="../static/css/navbar.css" />
    <link rel="stylesheet" href="../static/css/home.css" />
    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&display=swap" rel="stylesheet">


</head>

<body>

    <div id="navbar"></div>


    <div class="container">
        <div class="card">
            <div class="activity-section">
                <div class="mood-section">
                    <div class="mood-emoji">😊</div>
                    <div class="activity-title">Raymond's Daily Activity</div>

                </div>

                <div class="activity-item">
                    <div class="activity-icon steps-icon">👟</div>
                    <div class="activity-info">
                        <div class="activity-number">1,663</div>
                        <div class="activity-label">steps</div>
                    </div>
                </div>
                <div class="activity-item">
                    <div class="activity-icon time-icon">⏱️</div>
                    <div class="activity-info">
                        <div class="activity-number">18</div>
                        <div class="activity-label">minutes</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="score-section">
                <div class="score-title">Weekly Movement Score</div>
                <div class="score-circle">
                    <div class="score-bg">
                        <div class="score-fill" id="scoreFill"></div>
                    </div>
                    <div class="score-inner">
                        <div class="score-number">370</div>
                        <div class="score-total">/ 600</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="goals-section">
                <h3>Personal Goals</h3>

                <div class="goal-item">
                    <div class="goal-header">
                        <span class="goal-name">Daily Goal</span>
                        <span class="goal-streak">🔥3 day streak</span>
                        <span class="goal-progress">40 / 85</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" data-progress="47"></div>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-header">
                        <span class="goal-name">Weekly Goal</span>
                        <span class="goal-progress">153 / 600</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" data-progress="25"></div>
                    </div>
                </div>

                <div class="goal-item">
                    <div class="goal-header">
                        <span class="goal-name">Monthly Goal</span>
                        <span class="goal-progress">153 / 2400</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" data-progress="6"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card chart-section">
            <div class="chart-header">
                <div class="chart-title">Historic Activity</div>
                <div class="chart-toggle">
                    <button class="toggle-btn active">Hourly</button>
                    <button class="toggle-btn">Daily</button>
                    <button class="toggle-btn">Weekly</button>
                    <button class="toggle-btn">Monthly</button>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-day">
                    <div class="bars">
                        <div class="bar steps-bar" style="height: 65px;" data-value="65">
                            <div class="bar-value">65</div>
                        </div>
                        <div class="bar pam-bar" style="height: 55px;" data-value="55">
                            <div class="bar-value">55</div>
                        </div>
                    </div>
                    <div class="day-label">Day 1</div>
                </div>

                <div class="chart-day">
                    <div class="bars">
                        <div class="bar steps-bar" style="height: 58px;" data-value="58">
                            <div class="bar-value">58</div>
                        </div>
                        <div class="bar pam-bar" style="height: 48px;" data-value="48">
                            <div class="bar-value">48</div>
                        </div>
                    </div>
                    <div class="day-label">Day 2</div>
                </div>

                <div class="chart-day">
                    <div class="bars">
                        <div class="bar steps-bar" style="height: 90px;" data-value="90">
                            <div class="bar-value">90</div>
                        </div>
                        <div class="bar pam-bar" style="height: 40px;" data-value="40">
                            <div class="bar-value">40</div>
                        </div>
                    </div>
                    <div class="day-label">Day 3</div>
                </div>

                <div class="chart-day">
                    <div class="bars">
                        <div class="bar steps-bar" style="height: 87px;" data-value="87">
                            <div class="bar-value">87</div>
                        </div>
                        <div class="bar pam-bar" style="height: 78px;" data-value="78">
                            <div class="bar-value">78</div>
                        </div>
                    </div>
                    <div class="day-label">Day 4</div>
                </div>

                <div class="chart-day">
                    <div class="bars">
                        <div class="bar steps-bar" style="height: 110px;" data-value="110">
                            <div class="bar-value">110</div>
                        </div>
                        <div class="bar pam-bar" style="height: 95px;" data-value="95">
                            <div class="bar-value">95</div>
                        </div>
                    </div>
                    <div class="day-label">Day 5</div>
                </div>

                <div class="chart-day">
                    <div class="bars">
                        <div class="bar steps-bar" style="height: 54px;" data-value="54">
                            <div class="bar-value">54</div>
                        </div>
                        <div class="bar pam-bar" style="height: 35px;" data-value="35">
                            <div class="bar-value">35</div>
                        </div>
                    </div>
                    <div class="day-label">Day 6</div>
                </div>

                <div class="chart-day">
                    <div class="bars">
                        <div class="bar steps-bar" style="height: 140px;" data-value="140">
                            <div class="bar-value">140</div>
                        </div>
                        <div class="bar pam-bar" style="height: 105px;" data-value="105">
                            <div class="bar-value">105</div>
                        </div>
                    </div>
                    <div class="day-label">Day 7</div>
                </div>
            </div>

            <div class="chart-legend">
                <div class="legend-item">
                    <div class="legend-color legend-steps"></div>
                    <span>Steps</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-pam"></div>
                    <span>PAM</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../static/js/navbar.js"></script>
    <script src="../static/js/home.js"></script>

</body>

</html>
