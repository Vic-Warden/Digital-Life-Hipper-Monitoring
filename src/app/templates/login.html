<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&display=swap" rel="stylesheet">
  <title>login</title>
  <link rel="stylesheet" href="../static/css/login.css" />
</head>

<body>
  <header>
    <div class="header-content">
      <div class="header-line">
        <span>Hipper Therapeutics</span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="login-box">
      <h2>Welcome Back</h2>
      <form action="/login" method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />

        <button type="submit">Sign in</button>
      </form>

      <div class="adminLogin-link">
        <p>If you are a therapist: <a href="/admin/login" class="adminLoginButton"><b>Click here</b></a></p>
      </div>

    </section>

    <section class="image-box">
      <div class="logo">
        <img src="../static/assets/HIREZHipperLogoTransparent.png" alt="Hipper Therapeutics Logo" />
      </div>
    </section>
  </main>

  <script src="../static/js/login.js"></script>
</body>

</html>
