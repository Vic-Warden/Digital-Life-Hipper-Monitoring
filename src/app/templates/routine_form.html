<!DOCTYPE html>
<html>
<head>
  <title>Routine's check</title>
</head>
<body>
  <h2>Check break's routine</h2>
  <form id="routineForm">
    <label>Patient ID :</label>
    <input type="number" id="patient_id" required><br><br>
    <button type="submit">Check</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById('routineForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const patientId = document.getElementById('patient_id').value;

      const response = await fetch('/api/routine-disruption', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ patient_id: patientId })
      });

      const data = await response.json();
      const resultDiv = document.getElementById('result');

      if (!data.disruptions || data.disruptions.length === 0) {
        resultDiv.innerHTML = "<p><strong>Aucune rupture détectée.</strong></p>";
      } else {
        let html = "<h3>Activity's break detected :</h3><ul>";
        data.disruptions.forEach(d => {
          html += `<li>Slot ${d.hour_slot}h : days ${d.inactive_days.join(', ')}</li>`;
        });
        html += "</ul>";
        resultDiv.innerHTML = html;
      }
    });
  </script>
</body>
</html>
