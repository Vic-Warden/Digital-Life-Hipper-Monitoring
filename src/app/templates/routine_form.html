<!DOCTYPE html>
<html>
<head>
    <title>Check break's routine</title>
</head>
<body>
    <h1>Check break's routine</h1>
    <form method="post" onsubmit="sendRequest(event)">
        <label for="patient_id">Patient ID :</label>
        <input type="number" id="patient_id" name="patient_id" value="1">
        <button type="submit">Check</button>
    </form>

    <div id="result"></div>

    <script>
    async function sendRequest(event) {
        event.preventDefault();
        const patientId = document.getElementById("patient_id").value;

        const response = await fetch("/routine-form", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ patient_id: patientId })
        });

        const data = await response.json();
        const resultDiv = document.getElementById("result");

        if (data.disruptions.length === 0) {
            resultDiv.innerHTML = "<p><strong>Aucune rupture détectée.</strong></p>";
        } else {
            let html = "<h2>Ruptures détectées :</h2><ul>";
            data.disruptions.forEach(d => {
                html += `<li><strong>${d.hour_slot}h</strong> : ${d.inactive_days.join(", ")}</li>`;
            });
            html += "</ul>";
            resultDiv.innerHTML = html;
        }
    }
    </script>
</body>
</html>
